# Spring Boot 3.3 requires the JVM that runs Gradle to be JDK 17+ (plugin classpath fails on Java 8).
# macOS: ./gradlew auto-picks JDK 17 via /usr/libexec/java_home when your java is 8/11.
# Any OS: export JAVA_HOME to a JDK 17+ install, or uncomment (edit path):
# org.gradle.java.home=/Library/Java/JavaVirtualMachines/temurin-17.jdk/Contents/Home

# Jenkins / low-RAM agents: limit Gradle + Kotlin compiler heap and parallelism.
org.gradle.jvmargs=-Xmx1024m -XX:MaxMetaspaceSize=384m -XX:+UseParallelGC -Dfile.encoding=UTF-8
org.gradle.daemon=false
org.gradle.parallel=false
org.gradle.workers.max=1
org.gradle.caching=true
kotlin.compiler.execution.strategy=in-process
